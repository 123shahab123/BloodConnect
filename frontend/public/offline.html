<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#C0392B" />
  <title>BloodConnect — آفلاین</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', 'Noto Sans', sans-serif;
      background: #fff8f8;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #2c2c2c;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(192,57,43,0.08);
      border: 1px solid #fde8e6;
    }
    .icon { font-size: 64px; margin-bottom: 20px; }
    h1 { font-size: 22px; font-weight: 800; color: #C0392B; margin-bottom: 8px; }
    .subtitle { font-size: 15px; color: #666; margin-bottom: 4px; }
    .en { font-size: 13px; color: #999; margin-bottom: 28px; }
    button {
      background: #C0392B;
      color: white;
      border: none;
      border-radius: 14px;
      padding: 14px 28px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.15s;
    }
    button:active { opacity: 0.85; }
    .tip {
      margin-top: 20px;
      font-size: 12px;
      color: #aaa;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>اتصال اینترنت ندارید</h1>
    <p class="subtitle">برای استفاده از BloodConnect به اینترنت نیاز دارید.</p>
    <p class="en">You're offline. Please check your connection.</p>
    <button onclick="tryReload()">🔄 دوباره تلاش کنید</button>
    <p class="tip">
      اطلاعات کش‌شده (مانند لیست استان‌ها) هنوز در دسترس است.<br/>
      Cached data like province lists is still available.
    </p>
  </div>
  <script>
    function tryReload() {
      window.location.reload()
    }
    // Auto-retry when connection restores
    window.addEventListener('online', () => window.location.reload())
  </script>
</body>
</html>
